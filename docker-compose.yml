version: "3.9"

services:
  # 🔹 Servicio de base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: zentry_db
    restart: always
    environment:
      POSTGRES_DB: zentrydb
      POSTGRES_USER: zentry
      POSTGRES_PASSWORD: zentrypass
    ports:
      - "5433:5432" # El puerto 5433 del servidor se mapea al 5432 del contenedor
    volumes:
      - zentry_data:/var/lib/postgresql/data # Persistencia de datos

  # 🔹 Servicio del backend
  backend:
    build:
      context: ./backend # Ubicación del Dockerfile
    container_name: zentry_backend
    restart: always
    ports:
      - "8080:8080" # El puerto 8080 del contenedor se expone al servidor
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/zentrydb
      SPRING_DATASOURCE_USERNAME: zentry
      SPRING_DATASOURCE_PASSWORD: zentrypass
    depends_on:
      - db # Asegura que PostgreSQL arranque antes

# 🔹 Volúmenes para persistir datos de PostgreSQL
volumes:
  zentry_data:
